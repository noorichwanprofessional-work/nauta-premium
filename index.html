<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nauta Premium | Official Site</title>
    
    <!-- Link ke CSS Eksternal -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="progress"></div>

   <!-- Section 1: Beranda dengan Slider -->
<section class="hero">
    <img src="hero_nauta.jpg" alt="Nauta Premium Sasirangan and Perfume" class="hero-bg">
    
    <div class="hero-content reveal">
        <p class="overline">Exclusive Collection</p>
        <h1>Nauta Premium</h1>
        <p class="tagline">Sasirangan Luxury & Fine Perfumery</p>
        <a href="#services" class="btn-gold">Lihat Koleksi</a>
    </div>
</section>
        <!-- Slide 2 -->
        <div class="slide">
            <div class="reveal">
                <p class="overline">New Collection</p>
                <h1>Modern Luxury</h1>
                <p class="tagline">Eksklusivitas Tanpa Batas</p>
            </div>
        </div>
        <!-- Slide 3 -->
        <div class="slide">
            <div class="reveal">
                <p class="overline">Our Service</p>
                <h1>Trusted Quality</h1>
                <p class="tagline">Kepuasan Anda Prioritas Kami</p>
            </div>
        </div>
    </div>

    <!-- Tombol Navigasi Slider -->
    <div class="slider-dots">
        <span class="dot active" onclick="currentSlide(0)"></span>
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
    </div>

    <a href="#about" class="scroll-indicator">↓</a>
</section>
    
    <footer>
        &copy; 2026 NAUTA PREMIUM • Banjarbaru, Indonesia
    </footer>

    <!-- Link ke JS Eksternal -->
    <script src="script.js"></script>
</body>
</html>
