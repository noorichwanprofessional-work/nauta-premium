<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nauta Premium</title>
    <style>
        :root {
            --hitam: #1a1a1a;
            --gold: #d4af37;
            --pink: #ffb6c1;
            --cream: #fffdd0;
        }

        body {
            background-color: var(--hitam);
            color: var(--cream);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .card {
            background: linear-gradient(145deg, #222, #111);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: var(--pink);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            background-color: var(--gold);
            color: var(--hitam);
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: var(--pink);
            transform: scale(1.05);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--cream);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Nauta Premium</h1>
        <p>Eksklusivitas dalam Setiap Sentuhan</p>
        
        <a href="#" class="btn">Katalog Produk</a>
        <a href="#" class="btn">Hubungi WhatsApp</a>
        
        <div class="footer">
            &copy; 2026 Nauta Premium. All Rights Reserved.
        </div>
    </div>

</body>
</html>
